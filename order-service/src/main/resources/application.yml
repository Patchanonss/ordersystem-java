server:
  port: 8080

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders_db
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-group
      auto-offset-reset: earliest

logging:
  level:
    com.ordersystem: INFO
    org.apache.kafka: WARN

# Outbox Pattern configuration
outbox:
  polling:
    interval-ms: 5000       # Poll outbox_events table every 5 seconds
    batch-size: 20           # Max events to process per poll cycle
  cleanup:
    interval-ms: 3600000     # Run cleanup every 1 hour
    retention-days: 7        # Delete SENT events older than 7 days
  max-retry-count: 5         # Max publish retries before marking FAILED

